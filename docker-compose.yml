version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: releases-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: releases
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: releases-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/releases
      PORT: 3000
      NODE_ENV: production
    command: >
      sh -c "
        npx prisma migrate deploy &&
        node dist/server.js
      "
    restart: always

volumes:
  postgres_data: